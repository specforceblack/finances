<div class="wrap">
  <div class="panel">
    <div class="strong" style="font-size: 18px; margin-bottom: 12px">Enter PIN</div>
    <mat-form-field appearance="outline" style="width: 100%">
      <mat-label>PIN</mat-label>
      <input
        matInput
        type="password"
        inputmode="numeric"
        [ngModel]="pin()"
        (ngModelChange)="pin.set($event)"
        (keyup.enter)="submit()"
        autofocus
      />
    </mat-form-field>
    @if (error()) {
      <div class="tiny neg" style="margin-bottom: 8px">Wrong PIN, try again.</div>
    }
    <button mat-flat-button style="width: 100%" (click)="submit()">Unlock</button>
  </div>
</div>
